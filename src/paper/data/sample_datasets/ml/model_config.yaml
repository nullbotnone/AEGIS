# ML model configuration - anomaly detection v2.1
# Generated for AEGIS experiments
# Date: 2026-03-10

project: ml_anomaly_detection
version: 1.0.0

model:
  type: transformer
  layers: 6
  hidden_size: 256
  attention_heads: 12

training:
  batch_size: 32
  learning_rate: 0.001
  epochs: 100
  optimizer: adam

data:
  path: /projects/ml/data
  format: csv
  split: [0.8, 0.1, 0.1]
