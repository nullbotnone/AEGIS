# Physics simulation parameters
# Generated for AEGIS experiments
# Date: 2026-03-10

project: cfd_turbulence
version: 1.0.0

model:
  type: simulation
  layers: 12
  hidden_size: 768
  attention_heads: 12

training:
  batch_size: 32
  learning_rate: 0.001
  epochs: 100
  optimizer: adam

data:
  path: /projects/physics/sim_data
  format: parquet
  split: [0.8, 0.1, 0.1]
